<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Getting Started: Handing Form Submission</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
</head>
<body>
<h1>Form</h1>
<form action="#" th:action="@{/send_email}" th:object="${email}" method="post">
    <p>Введите email: <input type="text" th:field="*{email}"/></p>
    <p>Введите тему: <input type="text" th:field="*{title}"/></p>
    <p>Введите текст сообщения: <input type="text" th:field="*{message}"/></p>
    <p><input type="submit" value="Submit"/> <input type="reset" value="Reset"/></p>
</form>
</body>
</html>
